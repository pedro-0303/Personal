<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro.</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --text: #fff;
      --text-2: rgba(255,255,255,0.55);
      --text-3: rgba(255,255,255,0.25);
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.14);
      --glass-top: rgba(255,255,255,0.22);
      --accent: #3a7cff;
    }

    [data-theme="light"] {
      --bg: #EDE8DC;
      --text: #1A1612;
      --text-2: rgba(26,22,18,0.55);
      --text-3: rgba(26,22,18,0.28);
      --glass-bg: rgba(255,255,255,0.45);
      --glass-border: rgba(0,0,0,0.1);
      --glass-top: rgba(255,255,255,0.85);
      --accent: #2060F0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    /* ── SHADER BACKGROUND ── */
    #shader-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    #shader-bg canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── BACKGROUND OVERLAY ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(27,10,56,0.88) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 15% 100%, rgba(10,31,58,0.82) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 88% 90%,  rgba(26,8,48,0.78) 0%, transparent 50%),
        rgba(0,0,0,0.72);
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-2);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 20px;
      transition: background 0.2s, color 0.2s;
      letter-spacing: -0.01em;
    }

    .nav-links a:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* "Pedro." */
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(44px, 6vw, 76px);
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-title span { color: var(--accent); }

    /* date */
    .hero-date {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-2);
      letter-spacing: 0.01em;
      margin-bottom: 36px;
    }

    /* clock */
    .hero-clock {
      font-size: clamp(72px, 12vw, 148px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 56px;
      display: flex;
      align-items: baseline;
      gap: 0;
      font-variant-numeric: tabular-nums;
    }

    .clock-sep {
      font-weight: 200;
      opacity: 0.3;
      animation: blink 1s step-end infinite;
      margin: 0 4px;
    }

    .clock-sec {
      font-size: 0.3em;
      font-weight: 400;
      color: var(--text-2);
      align-self: flex-end;
      margin-bottom: 10px;
      margin-left: 12px;
      font-variant-numeric: tabular-nums;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── SECTION CARDS ── */
    .section-cards {
      display: flex;
      gap: 12px;
    }

    .s-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 24px 28px;
      min-width: 164px;
      border-radius: 20px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      overflow: hidden;

      background: var(--glass-bg);
      backdrop-filter: blur(60px) saturate(200%);
      -webkit-backdrop-filter: blur(60px) saturate(200%);
      border: 0.5px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-top),
        inset 0 -0.5px 0 rgba(255,255,255,0.04),
        0 2px 8px rgba(0,0,0,0.25),
        0 24px 64px rgba(0,0,0,0.45);

      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.28s ease,
                  background 0.2s ease;
    }

    /* glint layer */
    .s-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(145deg,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0) 45%,
        rgba(255,255,255,0.03) 100%
      );
      pointer-events: none;
    }

    /* colored glow behind each card */
    .s-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: -1;
    }

    .s-card:hover { transform: translateY(-4px) scale(1.015); }
    .s-card:hover::after { opacity: 1; }
    .s-card:active { transform: translateY(-1px) scale(0.99); transition-duration: 0.1s; }

    /* per-card accent colors */
    .s-card--agenda  { --c: #3a7cff; --c-rgb: 58,124,255; }
    .s-card--financas { --c: #30d158; --c-rgb: 48,209,88;  }
    .s-card--notas   { --c: #ffd60a; --c-rgb: 255,214,10;  }

    .s-card--agenda::after  { box-shadow: 0 8px 40px rgba(58,124,255,0.35); }
    .s-card--financas::after { box-shadow: 0 8px 40px rgba(48,209,88,0.30);  }
    .s-card--notas::after   { box-shadow: 0 8px 40px rgba(255,214,10,0.28);  }

    /* border tint on hover */
    .s-card--agenda:hover  { border-color: rgba(58,124,255,0.4);  background: rgba(58,124,255,0.08);  }
    .s-card--financas:hover { border-color: rgba(48,209,88,0.35);  background: rgba(48,209,88,0.07);   }
    .s-card--notas:hover   { border-color: rgba(255,214,10,0.35); background: rgba(255,214,10,0.06); }

    .s-card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(var(--c-rgb), 0.18);
      color: var(--c);
      flex-shrink: 0;
    }

    .s-card-icon svg { display: block; }

    .s-card-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .s-card-tag {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      letter-spacing: -0.01em;
    }

    /* colored dot on card label */
    .s-card-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c);
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
      opacity: 0.85;
    }

    /* ── BOTTOM HINT ── */
    .bottom-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 400;
      letter-spacing: 0.01em;
      pointer-events: none;
    }

    .home-indicator {
      width: 120px;
      height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
    }

    /* ── Theme toggle ── */
    .theme-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 0.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── Light mode overrides ── */
    [data-theme="light"] .bg {
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(180,200,255,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 15% 100%, rgba(200,180,255,0.25) 0%, transparent 55%),
        rgba(237,232,220,0.5);
    }
    [data-theme="light"] nav { background: rgba(237,232,220,0.75); border-bottom-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .nav-links a:hover { background: rgba(0,0,0,0.06); color: var(--text); }
    [data-theme="light"] .theme-btn { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.05); color: rgba(26,22,18,0.55); }
    [data-theme="light"] .theme-btn:hover { background: rgba(0,0,0,0.09); color: var(--text); }
    [data-theme="light"] .s-card { box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.1), 0 12px 32px rgba(0,0,0,0.12); }
    [data-theme="light"] .s-card--agenda:hover  { background: rgba(32,96,240,0.06); }
    [data-theme="light"] .s-card--financas:hover { background: rgba(48,209,88,0.06); }
    [data-theme="light"] .s-card--notas:hover   { background: rgba(255,160,0,0.06); }
    [data-theme="light"] .home-indicator { background: rgba(0,0,0,0.15); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 2px; }
      .nav-links a { padding: 5px 8px; font-size: 12px; }

      .hero-clock { font-size: clamp(56px, 16vw, 120px); margin-bottom: 36px; }
      .hero-title { font-size: clamp(36px, 10vw, 60px); }

      .section-cards { flex-direction: column; gap: 10px; width: 100%; padding: 0 20px; box-sizing: border-box; }
      .s-card { min-width: unset; flex-direction: row; padding: 16px 20px; gap: 14px; align-items: center; }
      .s-card-icon { flex-shrink: 0; }
      .s-card-name { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div id="shader-bg"></div>
  <div class="bg"></div>

  <nav>
    <div class="nav-logo">Pedro<span>.</span></div>
    <ul class="nav-links">
      <li><a href="mockup.html">Hub</a></li>
      <li><a href="agenda.html">Agenda</a></li>
      <li><a href="financas.html">Finanças</a></li>
      <li><a href="notas.html">Notas</a></li>
    </ul>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Alternar tema">
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </nav>

  <section class="hero">
    <h1 class="hero-title">Pedro<span>.</span></h1>
    <p class="hero-date" id="hero-date">—</p>

    <div class="hero-clock">
      <span id="clock-h">22</span><span class="clock-sep">:</span><span id="clock-m">14</span><span class="clock-sec" id="clock-s">37</span>
    </div>

    <div class="section-cards">
      <a class="s-card s-card--agenda" href="agenda.html">
        <div class="s-card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
          </svg>
        </div>
        <div class="s-card-name">Agenda</div>
        <div class="s-card-tag"><span class="s-card-dot"></span>Compromissos & datas</div>
      </a>

      <a class="s-card s-card--financas" href="financas.html">
        <div class="s-card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="s-card-name">Finanças</div>
        <div class="s-card-tag"><span class="s-card-dot"></span>Saldo & gastos</div>
      </a>

      <a class="s-card s-card--notas" href="notas.html">
        <div class="s-card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
          </svg>
        </div>
        <div class="s-card-name">Notas</div>
        <div class="s-card-tag"><span class="s-card-dot"></span>Registros & ideias</div>
      </a>
    </div>
  </section>

  <div class="bottom-hint">
    <div class="home-indicator"></div>
  </div>

  <script>
    (function() {
      const t = localStorage.getItem('pedro_theme') || 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();

    function toggleTheme() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const next = isLight ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pedro_theme', next);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const icon = document.getElementById('theme-icon');
      if (!icon) return;
      icon.innerHTML = isLight
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }

    document.addEventListener('DOMContentLoaded', updateThemeIcon);
  </script>

  <script>
    (function() {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js';
      s.onload = function() {
        const THREE = window.THREE;
        const container = document.getElementById('shader-bg');
        const camera = new THREE.Camera();
        camera.position.z = 1;
        const scene = new THREE.Scene();
        const geometry = new THREE.PlaneBufferGeometry(2, 2);
        const uniforms = {
          time: { type: 'f', value: 1.0 },
          resolution: { type: 'v2', value: new THREE.Vector2() }
        };
        const material = new THREE.ShaderMaterial({
          uniforms: uniforms,
          vertexShader: 'void main() { gl_Position = vec4(position, 1.0); }',
          fragmentShader: [
            '#define TWO_PI 6.2831853072',
            '#define PI 3.14159265359',
            'precision highp float;',
            'uniform vec2 resolution;',
            'uniform float time;',
            'float random(in float x) { return fract(sin(x)*1e4); }',
            'float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233)))*43758.5453123); }',
            'void main(void) {',
            '  vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);',
            '  vec2 fMosaicScal = vec2(4.0, 2.0);',
            '  vec2 vScreenSize = vec2(256.0, 256.0);',
            '  uv.x = floor(uv.x * vScreenSize.x / fMosaicScal.x) / (vScreenSize.x / fMosaicScal.x);',
            '  uv.y = floor(uv.y * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);',
            '  float t = time * 0.06 + random(uv.x) * 0.4;',
            '  float lineWidth = 0.0008;',
            '  vec3 color = vec3(0.0);',
            '  for(int j = 0; j < 3; j++) {',
            '    for(int i = 0; i < 5; i++) {',
            '      color[j] += lineWidth * float(i*i) / abs(fract(t - 0.01*float(j) + float(i)*0.01)*1.0 - length(uv));',
            '    }',
            '  }',
            '  float r = color[0]*0.55 + color[2]*0.25;',
            '  float g = color[1]*0.35 + color[0]*0.15;',
            '  float b = color[2]*1.0  + color[0]*0.20;',
            '  gl_FragColor = vec4(r, g, b, 1.0);',
            '}'
          ].join('\n')
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        const renderer = new THREE.WebGLRenderer();
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        function resize() {
          renderer.setSize(window.innerWidth, window.innerHeight);
          uniforms.resolution.value.x = renderer.domElement.width;
          uniforms.resolution.value.y = renderer.domElement.height;
        }
        resize();
        window.addEventListener('resize', resize);
        function animate() {
          requestAnimationFrame(animate);
          uniforms.time.value += 0.05;
          renderer.render(scene, camera);
        }
        animate();
      };
      document.head.appendChild(s);
    })();
  </script>

  <script>
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const pad = n => String(n).padStart(2,'0');

    function tick() {
      const now = new Date();
      document.getElementById('clock-h').textContent = pad(now.getHours());
      document.getElementById('clock-m').textContent = pad(now.getMinutes());
      document.getElementById('clock-s').textContent = pad(now.getSeconds());
      document.getElementById('hero-date').textContent =
        `${now.getDate()} de ${MONTHS[now.getMonth()]} · ${now.getFullYear()}`;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
