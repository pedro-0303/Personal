<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — Pedro.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --text: #fff;
      --text-2: rgba(255,255,255,0.55);
      --text-3: rgba(255,255,255,0.25);
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.14);
      --glass-top: rgba(255,255,255,0.22);
      --accent: #3a7cff;
    }

    [data-theme="light"] {
      --bg: #EDE8DC;
      --text: #1A1612;
      --text-2: rgba(26,22,18,0.55);
      --text-3: rgba(26,22,18,0.28);
      --glass-bg: rgba(255,255,255,0.45);
      --glass-border: rgba(0,0,0,0.1);
      --glass-top: rgba(255,255,255,0.85);
      --accent: #2060F0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background 0.3s ease;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%,  #0a1f3a 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 100%, #1b0a38 0%, transparent 55%),
        #000;
    }

    [data-theme="light"] .bg {
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(180,200,255,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 100%, rgba(200,180,255,0.2) 0%, transparent 55%),
        #EDE8DC;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    [data-theme="light"] nav { background: rgba(237,232,220,0.75); border-bottom-color: rgba(0,0,0,0.08); }

    .nav-logo {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-weight: 700; font-size: 18px; color: var(--text); text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 6px; list-style: none; }
    .nav-links a {
      font-size: 13px; font-weight: 400; color: var(--text-2);
      text-decoration: none; padding: 5px 12px; border-radius: 20px;
      transition: background 0.2s, color 0.2s; letter-spacing: -0.01em;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }
    [data-theme="light"] .nav-links a:hover { background: rgba(0,0,0,0.06); }
    [data-theme="light"] .nav-links a.active { background: rgba(0,0,0,0.05); }

    .theme-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 0.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    [data-theme="light"] .theme-btn { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.05); color: rgba(26,22,18,0.55); }
    [data-theme="light"] .theme-btn:hover { background: rgba(0,0,0,0.09); color: var(--text); }

    .page {
      position: relative; z-index: 1; min-height: 100vh;
      padding: 100px 48px 80px;
      display: flex; flex-direction: column; justify-content: center;
    }

    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 400; color: var(--accent);
      text-decoration: none; margin-bottom: 48px;
      padding: 6px 14px 6px 10px; border-radius: 20px; width: fit-content;
      background: rgba(58,124,255,0.1); border: 0.5px solid rgba(58,124,255,0.2);
      transition: background 0.2s;
    }
    .back:hover { background: rgba(58,124,255,0.18); }

    .page-label {
      font-size: 12px; font-weight: 500; color: var(--text-3);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
    }

    .page-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-weight: 900; font-size: clamp(52px, 7vw, 96px);
      letter-spacing: -0.03em; line-height: 0.95;
      color: var(--text); margin-bottom: 56px;
    }

    .placeholder {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 20px 28px; border-radius: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid var(--glass-border);
      box-shadow: inset 0 1px 0 var(--glass-top), 0 8px 32px rgba(0,0,0,0.4);
      font-size: 14px; color: var(--text-2); font-weight: 400;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); opacity: 0.5; }

    .home-indicator {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 5px; background: rgba(255,255,255,0.25); border-radius: 3px;
    }
    [data-theme="light"] .home-indicator { background: rgba(0,0,0,0.15); }

    @media (max-width: 640px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 2px; }
      .nav-links a { padding: 5px 8px; font-size: 12px; }
      .page { padding: 84px 20px 80px; }
      .page-title { margin-bottom: 36px; }
    }
  </style>
</head>
<body>
  <script>
    (function() {
      const t = localStorage.getItem('pedro_theme') || 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
    function toggleTheme() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const next = isLight ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pedro_theme', next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const icon = document.getElementById('theme-icon');
      if (!icon) return;
      icon.innerHTML = isLight
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcon);
  </script>

  <div class="bg"></div>

  <nav>
    <a class="nav-logo" href="mockup.html">Pedro<span>.</span></a>
    <ul class="nav-links">
      <li><a href="mockup.html">Hub</a></li>
      <li><a href="agenda.html" class="active">Agenda</a></li>
      <li><a href="financas.html">Finanças</a></li>
      <li><a href="notas.html">Notas</a></li>
    </ul>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Alternar tema">
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </nav>

  <div class="page">
    <a class="back" href="mockup.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
      Hub
    </a>
    <div class="page-label">01 — Agenda</div>
    <h1 class="page-title">Seus<br>compromissos.</h1>
    <div class="placeholder">
      <div class="dot"></div>
      Em construção — em breve aqui
    </div>
  </div>

  <div class="home-indicator"></div>
</body>
</html>
